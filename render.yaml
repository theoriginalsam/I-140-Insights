databases:
  - name: i140tracker-db
    databaseName: i140tracker
    plan: free

services:
  - type: web
    name: i140tracker-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: i140tracker-db
          property: connectionString
      - key: USCIS_CLIENT_ID
        value: phlZGw79TtreSBS9Yyqe28YZylbjyidG
      - key: USCIS_CLIENT_SECRET
        value: rJPPMj674uZYAVnd
      - key: USE_PROD
        value: false
      - key: ADMIN_KEY
        value: samir123
      - key: BROWSER_HEADED
        value: false

  - type: web
    name: i140tracker-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://i140tracker-backend.onrender.com
