services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: i140tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/i140tracker
      USCIS_CLIENT_ID: ${USCIS_CLIENT_ID}
      USCIS_CLIENT_SECRET: ${USCIS_CLIENT_SECRET}
      USE_PROD: ${USE_PROD:-false}
      ADMIN_KEY: ${ADMIN_KEY:-changeme123}
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
